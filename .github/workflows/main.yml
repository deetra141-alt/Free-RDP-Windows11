name: RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Tailscale
      run: |
        Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "tailscale.msi"
        Start-Process msiexec.exe -Wait -ArgumentList '/i tailscale.msi /quiet /norestart'
      shell: powershell

    - name: Connect to Tailscale
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=github-rdp
      shell: powershell

    - name: Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
      shell: powershell

    - name: Create User
      run: |
        $username = "rdpuser"
        $password = ConvertTo-SecureString "RDPpass123!" -AsPlainText -Force
        New-LocalUser -Name $username -Password $password -PasswordNeverExpires
        Add-LocalGroupMember -Group "Administrators" -Member $username
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
      shell: powershell

    - name: Get Tailscale IP
      run: |
        Start-Sleep -Seconds 10
        & "C:\Program Files\Tailscale\tailscale.exe" status
      shell: powershell

    - name: Maintain Connection
      run: |
        Write-Host "RDP is ready!"
        Write-Host "Username: rdpuser"
        Write-Host "Password: RDPpass123!"
        Write-Host "Connect using Tailscale IP"
        while ($true) { Start-Sleep -Seconds 60 }
      shell: powershell
